name: Scraper Diário de Vagas

on:
  schedule:
    - cron: '0 9 * * *'   # Todo dia às 06:00 BRT (09:00 UTC)
  workflow_dispatch:        # Permite rodar manualmente pelo GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
        run: python scraper/runner.py

      - name: Enrich jobs (location + salary from descriptions)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scraper/enricher.py

      - name: Summary
        run: echo "✅ Scraper + enricher concluídos com sucesso"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Scraper falhou — verifique os logs acima"
